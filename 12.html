<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stylish Bootstrap Website</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #eef2f3, #dfe9f3);
    }


     .navbar {
      background: linear-gradient(45deg, #667eea, #764ba2);
    }

       .hero {
      padding: 60px 0;
      text-align: center;
      color: #333;
    }

    .hero h1 {
      font-weight: 600;
    }
    .glass {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    }

     .btn-custom {
      background: linear-gradient(45deg, #667eea, #764ba2);
      color: white;
      border: none;
    }

    .btn-custom:hover {
      opacity: 0.9;
    }
    footer {
      background: #222;
    }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">MySite</a>
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
        <!-- Dropdown -->
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown">Features</a>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="#">Forms</a></li>
            <li><a class="dropdown-item" href="#">Modals</a></li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="hero">
  <div class="container">
    <h1>Beautiful Bootstrap Website</h1>
    <p class="lead">Modern UI with responsive design</p>
    <button class="btn btn-custom" data-bs-toggle="modal" data-bs-target="#myModal">
      Get Started
    </button>
  </div>
</div>

<div class="container">
  <nav>
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="#">Home</a></li>
      <li class="breadcrumb-item active">Dashboard</li>
    </ol>
  </nav>
</div>
<div class="container my-5">
  <div class="row">
    <!-- Main -->
    <div class="col-md-8">
      <!-- Card -->
      <div class="p-4 glass mb-4">
        <h4>Welcome 👋</h4>
        <p>This stylish website uses gradients.</p>
      </div>
      <div class="p-4 glass">
        <h4>Contact Form</h4>
        <form>
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" placeholder="Enter your name" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" placeholder="Enter email" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Subject</label>
            <input type="text" class="form-control" placeholder="Subject" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Message</label>
            <textarea class="form-control" rows="4" placeholder="Write your message..." required></textarea>
          </div>
          <button class="btn btn-custom w-100">Submit</button>
        </form>
      </div>
    </div>

     <div class="col-md-4">
      <div class="p-4 glass text-center">
        <h5>Sidebar</h5>
        <p>Clean & modern layout</p>
